name: Publish Package to npmjs

on:
    release:
        types: [published]

jobs:
    publish-npm:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'
                  cache: 'npm'
            - run: npm ci
            - name: Install clang-format
              run: sudo apt-get update && sudo apt-get install -y clang-format-15
            - name: Check formatting
              env:
                  CLANG_FORMAT: clang-format-15
              run: |
                  npm run format
                  if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
                    echo "Code is not formatted. Run 'npm run format' and commit the changes."
                    git diff
                    exit 1
                  fi
            - name: Lint
              run: npm run lint
            - name: Build
              run: npm run prepare
            - name: Publish to npm
              run: npm publish --provenance --access public ${{ github.event.release.prerelease && '--tag rc' || '' }}
