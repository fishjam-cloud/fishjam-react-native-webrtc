apply plugin: 'com.android.library'

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
    def agpVersion = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION
    if (agpVersion.tokenize('.')[0].toInteger() >= 7) {
      namespace "com.oney.WebRTCModule"
    }

    compileSdkVersion safeExtGet('compileSdkVersion', 24)
    buildToolsVersion safeExtGet('buildToolsVersion', "23.0.1")
    ndkVersion safeExtGet('ndkVersion', '27.1.12297006')

    buildFeatures {
        prefab true
    }

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion safeExtGet('targetSdkVersion', 24)
        versionCode 1
        versionName "1.0"
        consumerProguardFiles 'consumer-rules.pro'

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++20"
                arguments "-DANDROID_STL=c++_shared"
                // Matches the bundled WebRTC .so (arm64-v8a only for now). Widen
                // this and the `ndk` block below once a multi-arch WebRTC ships.
                abiFilters "arm64-v8a"
            }
        }

        ndk {
            abiFilters "arm64-v8a"
        }
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version safeExtGet('cmakeVersion', '3.22.1')
        }
    }

    // WebRTC requires Java 8 features
    // https://groups.google.com/forum/?utm_medium=email&utm_source=footer#!msg/discuss-webrtc/V1h2uQMDCkA/RA-uzncVAAAJ
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation "com.facebook.react:react-android:+"
    // TEMP (local test): patched WebRTC build with org.webrtc.AudioTrackSink (CL 471880).
    // libs/libwebrtc.jar + src/main/jniLibs/arm64-v8a/libjingle_peerconnection_so.so are built
    // locally from fishjam-cloud/webrtc@fishjam-m124-audio-sink. Revert to
    //   api 'org.jitsi:webrtc:124.+'
    // once the patched artifact is published.
    api files('libs/libwebrtc.jar')
    implementation "androidx.core:core:1.7.0"
    // fbjni is consumed via the ReactAndroid prefab at native link time, but the Java
    // runtime classes (com.facebook.jni.*) are provided by react-android transitively.
    // Pinned explicitly to match the prefab so JSI install (Phase 3) links cleanly.
    implementation 'com.facebook.fbjni:fbjni:0.6.0'
}
